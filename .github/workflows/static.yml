# Simple workflow for deploying static content to GitHub Pages
#
# ⚠ Limitation GitHub Pages vs Cloudflare Pages :
# Le fichier `_headers` à la racine du repo (utilisé pour désactiver le
# cache HTTP de sw.js / index.html / manifest.json) N'EST PAS pris en
# compte par GitHub Pages — c'est une fonctionnalité spécifique à
# Cloudflare Pages. GitHub Pages applique son propre cache par défaut.
#
# Conséquence : sur iOS Safari, le service worker peut rester bloqué sur
# une ancienne version pendant plusieurs heures après un déploiement.
# Si vous ciblez GitHub Pages, documenter dans le README la commande
# "🧹 Forcer la mise à jour" ou déployer plutôt sur Cloudflare Pages.
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
